plugins {
    id 'com.android.application'
}

android {
    namespace 'com.youtube.viewer'
    compileSdk 33

    defaultConfig {
        applicationId "com.youtube.viewer"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
        
        vectorDrawables.useSupportLibrary = true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    packaging {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
}

dependencies {
    // Không cần thêm dependency, pure WebView
}
