name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Debug - Check files
      run: |
        echo "=== Checking gradlew ==="
        ls -la gradlew
        file gradlew
        echo "=== First 5 lines ==="
        head -5 gradlew

    - name: Fix line endings and permissions
      run: |
        echo "=== Converting line endings from CRLF to LF ==="
        dos2unix gradlew 2>/dev/null || sed -i 's/\r$//' gradlew
        echo "=== Setting executable permission ==="
        chmod +x gradlew
        echo "=== Verifying ==="
        ls -la gradlew
        file gradlew

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Debug - Check Gradle
      run: |
        echo "=== Java version ==="
        java -version
        echo "=== Gradle version (system) ==="
        gradle --version || true

    - name: Install Gradle (if wrapper missing)
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "Downloading Gradle 7.6"
          curl -sLo gradle.zip https://services.gradle.org/distributions/gradle-7.6-bin.zip
          sudo unzip -q gradle.zip -d /opt
          sudo ln -sf /opt/gradle-7.6/bin/gradle /usr/local/bin/gradle
          rm gradle.zip
        fi

    - name: Grant execute permission for gradlew (Extra safety)
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
        else
          echo "KEYSTORE_BASE64 not set; skipping keystore decode"
          touch app/keystore.jks
        fi

    - name: Clean previous builds
      run: gradle clean

    - name: Build Universal Release APK
      run: gradle assembleRelease -x lint -x lintVitalRelease
      env:
        KEYSTORE_FILE: keystore.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Verify APK Signature
      run: |
        if [ -f "$ANDROID_HOME/build-tools/34.0.0/apksigner" ]; then
          "$ANDROID_HOME/build-tools/34.0.0/apksigner" verify --verbose --print-certs app/build/outputs/apk/release/app-release.apk || true
        else
          echo "apksigner not found; skipping verification"
        fi

    - name: Debug - Check APK output
      run: |
        echo "=== Checking APK files ==="
        find app/build/outputs -name "*.apk" -type f
        ls -lh app/build/outputs/apk/release/

    - name: Upload Universal APK as Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: YouTube-App-Universal
        path: app/build/outputs/apk/release/app-release.apk
        if-no-files-found: warn

    - name: Upload All APKs as Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: YouTube-App-All-Architectures
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: warn

    - name: Check build success
      run: |
        if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
          echo "✅ Build SUCCESS - Universal APK created!"
          ls -lh app/build/outputs/apk/release/app-release.apk
        else
          echo "⚠️ Universal APK not found, checking other APKs..."
          ls -lh app/build/outputs/apk/release/ || echo "❌ No APKs found!"
        fi
