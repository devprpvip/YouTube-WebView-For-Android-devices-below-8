name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Debug - Check files
      run: |
        echo "=== Checking gradlew ==="
        ls -la gradlew
        file gradlew
        echo "=== First 5 lines ==="
        head -5 gradlew

    - name: Fix line endings and permissions
      run: |
        echo "=== Converting line endings from CRLF to LF ==="
        dos2unix gradlew 2>/dev/null || sed -i 's/\r$//' gradlew
        echo "=== Setting executable permission ==="
        chmod +x gradlew
        echo "=== Verifying ==="
        ls -la gradlew
        file gradlew

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Debug - Check Gradle
      run: |
        echo "=== Java version ==="
        java -version
        echo "=== Gradle version (system) ==="
        gradle --version || true

    - name: Install Gradle (if wrapper missing)
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          sudo apt-get update && sudo apt-get install -y gradle
        fi

    - name: Grant execute permission for gradlew (Extra safety)
      run: chmod +x gradlew

    - name: Clean previous builds
      run: gradle clean

    - name: Build Release APK
      run: gradle assembleRelease -x lint

    - name: Debug - Check APK output
      run: |
        echo "=== Checking APK files ==="
        find app/build/outputs -name "*.apk" -type f
        ls -lh app/build/outputs/apk/release/

    - name: Upload Universal APK as Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: YouTube-App-Universal
        path: app/build/outputs/apk/release/*universal*.apk
        if-no-files-found: warn

    - name: Upload All APKs as Artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: YouTube-App-All-Architectures
        path: app/build/outputs/apk/release/*.apk
        if-no-files-found: warn

    - name: Check build success
      run: |
        if [ -f "app/build/outputs/apk/release/app-release-universal.apk" ]; then
          echo "✅ Build SUCCESS - Universal APK created!"
          ls -lh app/build/outputs/apk/release/app-release-universal.apk
        else
          echo "⚠️ Universal APK not found, checking other APKs..."
          ls -lh app/build/outputs/apk/release/ || echo "❌ No APKs found!"
        fi
